version: '3.8'

services:
  # ─── Metadata Store (replaces RDS) ───────────────────────────────
  postgres:
    image: postgres:15
    container_name: etl_postgres
    environment:
      POSTGRES_DB: etlplatform
      POSTGRES_USER: etluser
      POSTGRES_PASSWORD: etlpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etluser -d etlplatform"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Mock Source DB (fake data source) ───────────────────────────
  mock_source_db:
    image: postgres:15
    container_name: etl_mock_source
    environment:
      POSTGRES_DB: sourcedb
      POSTGRES_USER: sourceuser
      POSTGRES_PASSWORD: sourcepassword
    ports:
      - "5433:5432"
    volumes:
      - mock_source_data:/var/lib/postgresql/data
      - ./mock-data:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourceuser -d sourcedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Object Storage (replaces S3) ────────────────────────────────
  minio:
    image: minio/minio
    container_name: etl_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API (replaces Lambda + API Gateway) ──────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: etl_backend
    environment:
      # Database (swap to RDS endpoint in AWS)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: etlplatform
      DB_USER: etluser
      DB_PASSWORD: etlpassword
      # Source DB mock (swap to real source in AWS)
      SOURCE_DB_HOST: mock_source_db
      SOURCE_DB_PORT: 5432
      SOURCE_DB_NAME: sourcedb
      SOURCE_DB_USER: sourceuser
      SOURCE_DB_PASSWORD: sourcepassword
      # Storage (swap to S3 in AWS)
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: etl-staging
      # Airflow (swap to MWAA endpoint in AWS)
      AIRFLOW_ENDPOINT: http://airflow:8080
      AIRFLOW_USER: admin
      AIRFLOW_PASSWORD: admin
      # Snowflake mock (swap to real Snowflake in AWS)
      SNOWFLAKE_HOST: postgres
      SNOWFLAKE_PORT: 5432
      SNOWFLAKE_DB: etlplatform
      SNOWFLAKE_USER: etluser
      SNOWFLAKE_PASSWORD: etlpassword
      SNOWFLAKE_SCHEMA: snowflake_target
      # Auth (set to true in AWS with Cognito)
      AUTH_ENABLED: "false"
      ENVIRONMENT: local
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mock_source_db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Airflow (replaces MWAA) ──────────────────────────────────────
  airflow:
    image: apache/airflow:2.8.1
    container_name: etl_airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://etluser:etlpassword@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      AIRFLOW__WEBSERVER__SECRET_KEY: secret
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      BACKEND_ENDPOINT: http://backend:8000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
        airflow webserver &
        airflow scheduler
      "

  # ─── Frontend UI ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: etl_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  mock_source_data:
  minio_data:
  airflow_logs:
